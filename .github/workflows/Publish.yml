name: ProxyTransport-Geyser Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - name: Build ProxyTransport-Geyser
        run: ./gradlew build
      - name: Create Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          title: "ProxyTransport-Geyser ${{ github.ref_name }}"
          files: |
            build/libs/ProxyTransport-Geyser.jar
